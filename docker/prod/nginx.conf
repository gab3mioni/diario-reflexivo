server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # ---- Segurança ----
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ---- Logs ----
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- Static assets (Vite build) — cache longo, fingerprinted ----
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Favicons, robots, etc. ----
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ---- Main location — tudo vai para Laravel via PHP-FPM ----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts alinhados com max_execution_time do PHP (60s)
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;

        # Buffer para respostas Inertia (podem ser grandes com props)
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    # ---- Bloqueia arquivos ocultos (.env, .git, etc.) ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- Health check para load balancer ----
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ---- PHP-FPM status (acesso interno apenas) ----
    location = /fpm-status {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker networks
        deny all;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location = /fpm-ping {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ---- Upload limits ----
    client_max_body_size 20M;
}
