# =============================================================================
# docker-compose.prod.yml — Orquestração de produção
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Serviços:
#   app       — PHP-FPM (Laravel). Migrations + cache warmup no entrypoint.
#   nginx     — Reverse proxy + estáticos. Única porta exposta (80).
#   queue     — Worker Redis.
#   scheduler — Laravel scheduler.
#   mysql     — MySQL 8.4. Sem porta exposta.
#   redis     — Redis 7 com senha. Sem porta exposta.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    image: diario-reflexivo:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/shared-public
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public:ro
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue:
    image: diario-reflexivo:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    entrypoint: []
    command: ["php", "artisan", "queue:work", "redis",
              "--sleep=1", "--tries=3", "--backoff=5,20",
              "--max-time=3600", "--max-jobs=500"]
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  scheduler:
    image: diario-reflexivo:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    entrypoint: []
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-diario_reflexivo}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=200
      - --slow-query-log=ON
      - --long-query-time=2

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}",
              "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru",
              "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  backend:
    driver: bridge

volumes:
  app-storage:
    driver: local
  app-public:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local
